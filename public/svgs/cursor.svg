<svg
  xmlns="http://www.w3.org/2000/svg"
  width="48"
  height="48"
  viewBox="0 0 48 48"
  fill="none"
>
  <defs>
    <!-- Neon glow filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur">
        <animate
          attributeName="stdDeviation"
          values="1;2.5;1"
          dur="2s"
          repeatCount="indefinite"
        />
      </feGaussianBlur>

      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Arrow (static, no glow) -->
  <path
    d="M4 4 H14 M4 4 V14"
    stroke="#00ff41"
    stroke-width="2.5"
    stroke-linecap="square"
  />

  <!-- Cube -->
  <g filter="url(#neonGlow)">
    <g>
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 24 22"
        to="360 24 22"
        dur="1s"
        repeatCount="indefinite"
      />

      <path
        d="
          M24 10
          L34 16
          L24 22
          L14 16
          Z

          M14 16
          L14 28
          L24 34
          L24 22

          M24 22
          L34 16
          L34 28
          L24 34
        "
        fill="none"
        stroke="#00ff41"
        stroke-width="3"
        stroke-linejoin="round"
        stroke-linecap="round"
      />
    </g>
  </g>
</svg>
